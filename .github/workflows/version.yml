name: version.yml
on:
  pull_request:
    branches: [ 'main' ]

permissions:
  contents: read

jobs:
  version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: cperezabo/setup-git-mkver@v1.2.0
      - name: Next Version
        run: git mkver next --format '{Docker}'
